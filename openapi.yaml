openapi: 3.0.3
info:
  title: InsureZen Claims API
  description: |
    REST API for InsureZen medical insurance claim processing system.
    Supports the complete Maker → Checker workflow with strict state machine,
    concurrency safety, and claim forwarding.
  version: "1.0.0"
  contact:
    name: Muawiz Farooqi
servers:
  - url: http://localhost:8080
    description: Local development server

components:
  schemas:
    ClaimStatus:
      type: string
      enum:
        - NEW
        - MAKER_ASSIGNED
        - MAKER_REVIEWED
        - CHECKER_ASSIGNED
        - COMPLETED
        - FORWARDED

    Recommendation:
      type: string
      enum: [APPROVE, REJECT]

    StandardizedData:
      type: object
      properties:
        patientName:
          type: string
        patientDateOfBirth:
          type: string
          format: date
        policyNumber:
          type: string
        claimAmount:
          type: number
          format: float
        diagnosisCodes:
          type: array
          items:
            type: string
        procedureCodes:
          type: array
          items:
            type: string
        serviceDate:
          type: string
          format: date
        providerName:
          type: string
        totalBilledAmount:
          type: number
          format: float
        insuranceCoveredAmount:
          type: number
          format: float
        patientResponsibility:
          type: number
          format: float

    ClaimCreateRequest:
      type: object
      required:
        - insuranceCompany
        - standardizedData
      properties:
        externalClaimReference:
          type: string
          example: "CLM-987654"
        insuranceCompany:
          type: string
          example: "Al Sagr National Insurance"
        submissionDate:
          type: string
          format: date-time
        standardizedData:
          $ref: '#/components/schemas/StandardizedData'

    MakerRecommendationRequest:
      type: object
      required:
        - recommendation
      properties:
        recommendation:
          $ref: '#/components/schemas/Recommendation'
        makerFeedback:
          type: string
          example: "All documents verified. Treatment is medically necessary."

    CheckerDecisionRequest:
      type: object
      required:
        - decision
      properties:
        decision:
          $ref: '#/components/schemas/Recommendation'
        checkerFeedback:
          type: string
          example: "Recommendation accepted after second verification."

    ClaimDto:
      type: object
      properties:
        claimId:
          type: string
          format: uuid
        externalClaimReference:
          type: string
        insuranceCompany:
          type: string
        submissionDate:
          type: string
          format: date-time
        standardizedData:
          $ref: '#/components/schemas/StandardizedData'
        status:
          $ref: '#/components/schemas/ClaimStatus'
        makerId:
          type: string
        makerFeedback:
          type: string
        makerRecommendation:
          $ref: '#/components/schemas/Recommendation'
          nullable: true
        makerReviewedAt:
          type: string
          format: date-time
          nullable: true
        checkerId:
          type: string
        checkerDecision:
          $ref: '#/components/schemas/Recommendation'
          nullable: true
        checkerFeedback:
          type: string
        checkerReviewedAt:
          type: string
          format: date-time
          nullable: true
        forwardedAt:
          type: string
          format: date-time
          nullable: true
        forwardedTo:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PaginatedResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ClaimDto'
        total:
          type: integer
        page:
          type: integer
        size:
          type: integer

  responses:
    Error400:
      description: Bad Request - Validation error
      content:
        application/json:
          schema:
            type: object
            properties:
              message: { type: string }
              errors: { type: object }
    Error404:
      description: Claim not found
    Error409:
      description: Conflict - Claim already assigned to another user

paths:
  /api/v1/claims:
    post:
      summary: Ingest new claim (Upstream OCR Service)
      description: Creates a new Claim with status NEW
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClaimCreateRequest'
      responses:
        '201':
          description: Claim successfully ingested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClaimDto'
        '400':
          $ref: '#/components/responses/Error400'

    get:
      summary: Paginated & filterable claim history
      description: Used by Frontend Dashboard
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ClaimStatus'
        - name: insuranceCompany
          in: query
          schema: { type: string }
        - name: startDate
          in: query
          schema: { type: string, format: date }
        - name: endDate
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: Paginated claims
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'

  /api/v1/claims/history:
    get:
      summary: Alternative alias for claim history
      parameters: [] # same as above
      responses:
        '200':
          description: Paginated claims
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'

  /api/v1/claims/{claimId}:
    get:
      summary: Get full claim details
      parameters:
        - name: claimId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Full claim details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClaimDto'
        '404':
          $ref: '#/components/responses/Error404'

  # ==================== MAKER FLOW ====================
  /api/v1/maker/claims/pending:
    get:
      summary: Claims available for Maker review (status = NEW)
      responses:
        '200':
          description: List of available claims
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClaimDto'

  /api/v1/claims/{claimId}/maker/assign:
    post:
      summary: Maker assigns/locks a claim (concurrency protection)
      parameters:
        - name: claimId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Claim assigned to Maker (status → MAKER_ASSIGNED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClaimDto'
        '409':
          $ref: '#/components/responses/Error409'

  /api/v1/claims/{claimId}/maker/recommendation:
    post:
      summary: Submit Maker recommendation & feedback
      parameters:
        - name: claimId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MakerRecommendationRequest'
      responses:
        '200':
          description: Maker review saved (status → MAKER_REVIEWED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClaimDto'

  # ==================== CHECKER FLOW ====================
  /api/v1/checker/claims/pending:
    get:
      summary: Claims ready for Checker review (status = MAKER_REVIEWED)
      responses:
        '200':
          description: List of claims awaiting Checker
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClaimDto'

  /api/v1/claims/{claimId}/checker/assign:
    post:
      summary: Checker assigns/locks a claim (concurrency protection)
      parameters:
        - name: claimId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Claim assigned to Checker (status → CHECKER_ASSIGNED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClaimDto'
        '409':
          $ref: '#/components/responses/Error409'

  /api/v1/claims/{claimId}/checker/decision:
    post:
      summary: Submit Checker final decision + forwarding
      description: |
        Final decision. Automatically transitions status to COMPLETED → FORWARDED,
        sets forwardedAt timestamp, and logs forwarding action (stub).
      parameters:
        - name: claimId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckerDecisionRequest'
      responses:
        '200':
          description: Final decision saved and claim forwarded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClaimDto'